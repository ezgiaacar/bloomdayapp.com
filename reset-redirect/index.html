<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BloomDay — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #F0EBE3;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      color: #3D2B1F;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #FDFAF6;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(61,43,31,0.06);
    }
    .brand { font-family: 'Fraunces', Georgia, serif; font-size: 24px; color: #3D2B1F; }
    .tagline { font-size: 11px; color: #8C7B6B; margin-top: 4px; letter-spacing: 1px; }
    .emoji { font-size: 40px; margin: 28px 0 12px; }
    .title { font-family: 'Fraunces', Georgia, serif; font-size: 22px; color: #3D2B1F; font-style: italic; }
    .subtitle { font-size: 14px; color: #6B4E2A; margin-top: 12px; line-height: 1.7; }
    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 40px;
      background: #3D2B1F;
      color: #FDFAF6;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .note { font-size: 11px; color: #B5A89A; margin-top: 24px; line-height: 1.6; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #D4C9BC; border-top-color: #3D2B1F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">BloomDay</div>
    <div class="tagline">grow every day</div>
    <div class="emoji">🔑</div>
    <div class="title" id="title">Opening BloomDay…</div>
    <div class="subtitle" id="subtitle"><span class="spinner"></span>Redirecting to the app</div>
    <a class="btn" id="openBtn" style="display:none;" href="#">Open BloomDay</a>
    <div class="note" id="note"></div>
  </div>

  <script>
    (function () {
      // Grab params from hash fragment (implicit flow) or query string (PKCE flow)
      var raw = window.location.hash.substring(1) || window.location.search.substring(1);
      if (!raw) {
        document.getElementById('title').textContent = 'Link Expired';
        document.getElementById('subtitle').textContent = 'Please request a new password reset from the app.';
        return;
      }

      // Parse params
      var params = {};
      raw.split('&').forEach(function (pair) {
        var parts = pair.split('=');
        if (parts.length === 2) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
      });

      // Build deep link — ensure type=recovery is present
      var deepParams = [];
      if (params.access_token) deepParams.push('access_token=' + encodeURIComponent(params.access_token));
      if (params.refresh_token) deepParams.push('refresh_token=' + encodeURIComponent(params.refresh_token));
      if (params.code) deepParams.push('code=' + encodeURIComponent(params.code));
      deepParams.push('type=' + encodeURIComponent(params.type || 'recovery'));

      var deepLink = 'bloomday://reset-password?' + deepParams.join('&');

      // Try to open the app
      window.location.replace(deepLink);

      // Fallback: if the app didn't open after 1.5s, show manual button
      setTimeout(function () {
        document.getElementById('title').textContent = 'Reset Your Password';
        document.getElementById('subtitle').textContent = 'Tap below to open BloomDay and set your new password.';
        var btn = document.getElementById('openBtn');
        btn.href = deepLink;
        btn.style.display = 'inline-block';
        document.getElementById('note').textContent = "If the button doesn't work, open BloomDay and request a new reset from the login screen.";
      }, 1500);
    })();
  </script>
</body>
</html>
